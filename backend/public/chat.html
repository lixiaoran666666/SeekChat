<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekChat</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #111827;
        }
        #sidebar {
            width: 280px;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            background: #f9fafb;
        }
        #new-chat {
            margin: 12px;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #ffffff;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
        }
        #conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 12px;
        }
        .conversation-item {
            width: 100%;
            padding: 10px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            cursor: pointer;
            text-align: left;
        }
        .conversation-item:hover,
        .conversation-item.active {
            background: #eef2ff;
        }
        .conversation-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .menu-btn {
            border: 0;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }
        #chat {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        #topbar {
            min-height: 52px;
            padding: 12px 18px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #logout {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            padding: 8px 10px;
            cursor: pointer;
        }
        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .msg {
            max-width: 850px;
            margin-bottom: 14px;
            line-height: 1.55;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
        .role {
            display: block;
            margin-bottom: 4px;
            font-weight: 700;
            color: #4b5563;
        }
        #input-area {
            display: flex;
            gap: 10px;
            border-top: 1px solid #e5e7eb;
            padding: 12px;
        }
        #input {
            flex: 1;
            min-width: 0;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
        }
        #send {
            width: 88px;
            border: 0;
            border-radius: 8px;
            background: #111827;
            color: #fff;
            cursor: pointer;
        }
        #send:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        .menu {
            position: absolute;
            min-width: 120px;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
            display: none;
            z-index: 100;
            overflow: hidden;
        }
        .menu button {
            width: 100%;
            padding: 10px 14px;
            border: 0;
            background: #fff;
            cursor: pointer;
            text-align: left;
        }
        .menu button:hover {
            background: #f3f4f6;
        }
    </style>
</head>
<body>
<aside id="sidebar">
    <button id="new-chat" type="button">+ New chat</button>
    <div id="conversation-list"></div>
</aside>

<main id="chat">
    <header id="topbar">
        <strong id="chat-title">SeekChat</strong>
        <button id="logout" type="button">Log out</button>
    </header>
    <div id="messages"></div>
    <div id="input-area">
        <input id="input" placeholder="Type a message" autocomplete="off">
        <button id="send" type="button">Send</button>
    </div>
</main>

<div id="menu" class="menu">
    <button id="pin" type="button">Pin</button>
    <button id="rename" type="button">Rename</button>
    <button id="delete" type="button">Delete</button>
</div>

<script>
    const userId = localStorage.getItem("user_id");
    if (!userId) {
        window.location.href = "/login.html";
    }

    let currentConversationId = null;
    let conversations = [];
    let menuTargetId = null;

    const listEl = document.getElementById("conversation-list");
    const messagesEl = document.getElementById("messages");
    const menu = document.getElementById("menu");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const chatTitle = document.getElementById("chat-title");

    async function fetchJson(url, options) {
        const res = await fetch(url, options);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || "Request failed");
        return data;
    }

    async function loadConversations() {
        conversations = await fetchJson(`/api/chat/conversations/${userId}`);
        renderList();
    }

    function renderList() {
        listEl.textContent = "";
        conversations.forEach(conversation => {
            const row = document.createElement("button");
            row.type = "button";
            row.className = "conversation-item";
            if (conversation._id === currentConversationId) row.classList.add("active");

            const title = document.createElement("span");
            title.className = "conversation-title";
            title.textContent = conversation.title || "New Chat";

            const menuButton = document.createElement("button");
            menuButton.type = "button";
            menuButton.className = "menu-btn";
            menuButton.textContent = "...";
            menuButton.title = "Conversation actions";

            row.append(title, menuButton);
            row.addEventListener("click", () => loadHistory(conversation._id));
            menuButton.addEventListener("click", event => {
                event.stopPropagation();
                openMenu(event, conversation._id);
            });
            listEl.appendChild(row);
        });
    }

    async function loadHistory(id) {
        currentConversationId = id;
        const conversation = conversations.find(item => item._id === id);
        chatTitle.textContent = conversation?.title || "SeekChat";
        messagesEl.textContent = "";

        const data = await fetchJson(`/api/chat/history/${id}`);
        if (Array.isArray(data.messages)) {
            data.messages.forEach(message => appendMessage(message.role, message.content));
        }
        renderList();
    }

    async function createConversation() {
        const conversation = await fetchJson("/api/chat/new", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({userId})
        });

        await loadConversations();
        await loadHistory(conversation._id);
        input.focus();
    }

    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        if (!currentConversationId) {
            await createConversation();
        }

        input.value = "";
        sendBtn.disabled = true;
        input.disabled = true;

        appendMessage("user", text);
        const aiDiv = appendMessage("assistant", "");

        try {
            const res = await fetch("/api/chat/send", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ userId, conversationId: currentConversationId, message: text })
            });

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.message || "Failed to send message");
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, {stream: true});
                const parts = buffer.split("\n\n");
                buffer = parts.pop();

                for (const part of parts) {
                    if (part.startsWith("event: error")) {
                        const dataLine = part.split("\n").find(line => line.startsWith("data: "));
                        throw new Error(dataLine ? JSON.parse(dataLine.slice(6)) : "AI request failed");
                    }

                    if (part.startsWith("data: ")) {
                        const token = part.slice(6);
                        if (token !== "[DONE]") {
                            aiDiv.append(document.createTextNode(JSON.parse(token)));
                        }
                    }
                }
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            await loadConversations();
        } catch (err) {
            aiDiv.textContent = `Error: ${err.message}`;
        } finally {
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement("div");
        div.className = "msg";

        const label = document.createElement("span");
        label.className = "role";
        label.textContent = role === "user" ? "You" : "AI";

        const content = document.createElement("span");
        content.textContent = text;

        div.append(label, content);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return content;
    }

    function openMenu(event, id) {
        menuTargetId = id;
        menu.style.left = `${event.pageX}px`;
        menu.style.top = `${event.pageY}px`;
        menu.style.display = "block";
    }

    document.body.addEventListener("click", event => {
        if (!menu.contains(event.target) && !event.target.classList.contains("menu-btn")) {
            menu.style.display = "none";
        }
    });

    document.getElementById("delete").addEventListener("click", async () => {
        await fetchJson(`/api/chat/delete/${menuTargetId}`, {method: "DELETE"});
        if (menuTargetId === currentConversationId) {
            currentConversationId = null;
            messagesEl.textContent = "";
            chatTitle.textContent = "SeekChat";
        }
        menu.style.display = "none";
        await loadConversations();
    });

    document.getElementById("rename").addEventListener("click", async () => {
        const title = prompt("New conversation name");
        if (!title) return;
        await fetchJson(`/api/chat/rename/${menuTargetId}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({title})
        });
        menu.style.display = "none";
        await loadConversations();
        if (menuTargetId === currentConversationId) chatTitle.textContent = title;
    });

    document.getElementById("pin").addEventListener("click", async () => {
        await fetchJson(`/api/chat/pin/${menuTargetId}`, {method: "PUT"});
        menu.style.display = "none";
        await loadConversations();
    });

    document.getElementById("new-chat").addEventListener("click", createConversation);
    document.getElementById("logout").addEventListener("click", () => {
        localStorage.removeItem("user_id");
        localStorage.removeItem("username");
        window.location.href = "/login.html";
    });
    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", event => {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });

    loadConversations().catch(err => {
        messagesEl.textContent = `Failed to load conversations: ${err.message}`;
    });
</script>
</body>
</html>
