<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SeekChat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Arial, sans-serif; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f7f7f8; color: #111827; }
        .card { width: min(360px, calc(100vw - 32px)); padding: 28px; border-radius: 10px; border: 1px solid #e5e7eb; background: #fff; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
        h1 { text-align: center; margin-bottom: 20px; font-size: 24px; font-weight: 650; }
        label { display: block; margin-bottom: 6px; color: #374151; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; }
        button { width: 100%; padding: 12px; background: #111827; color: #fff; border: 0; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:disabled { opacity: 0.65; cursor: not-allowed; }
        .error { min-height: 20px; margin-top: 12px; color: #b91c1c; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
<main class="card">
    <h1>SeekChat</h1>
    <label for="username">Username</label>
    <input id="username" autocomplete="username" placeholder="Enter username">
    <label for="password">Password</label>
    <input id="password" autocomplete="current-password" placeholder="Enter password" type="password">
    <button id="loginBtn" type="button">Log in</button>
    <p id="error" class="error"></p>
</main>

<script>
    const loginBtn = document.getElementById("loginBtn");
    const errorEl = document.getElementById("error");

    loginBtn.addEventListener("click", login);
    document.addEventListener("keydown", event => {
        if (event.key === "Enter") login();
    });

    async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        errorEl.textContent = "";
        if (!username || !password) {
            errorEl.textContent = "Please enter both username and password.";
            return;
        }

        loginBtn.disabled = true;
        try {
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.message || "Login failed");
            }

            localStorage.setItem("user_id", data.userId);
            localStorage.setItem("username", data.username || username);
            window.location.href = "./chat.html";
        } catch (err) {
            errorEl.textContent = err.message;
        } finally {
            loginBtn.disabled = false;
        }
    }
</script>
</body>
</html>
