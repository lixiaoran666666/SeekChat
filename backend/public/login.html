<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - DeepSeek</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
        body { background: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 340px; padding: 24px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 20px; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-bottom: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        button { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #333; }
    </style>
</head>
<body>

<div class="card">
    <h2>登录 DeepSeek</h2>
    <input id="username" placeholder="用户名" />
    <input id="password" placeholder="密码" type="password" />
    <button id="loginBtn">登录</button>
</div>

<script>
    document.getElementById("loginBtn").addEventListener("click", login);

    async function login() {
        console.log("✅ 登录按钮被点击");

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) return alert("请输入完整信息");

        try {
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            console.log("✅ 后端返回数据：", data);

            // ✅ 重点修改：判断 userId 是否存在，而不是 success
            if (data.userId) {
                localStorage.setItem("user_id", data.userId);
                alert("登录成功！");
                window.location.href = "./chat.html";
            } else {
                alert("登录失败：" + (data.message || "未知错误"));
            }

        } catch (err) {
            console.error("❌ login 请求失败:", err);
            alert("请求失败，请检查后端是否启动！");
        }
    }


</script>

</body>
</html>
